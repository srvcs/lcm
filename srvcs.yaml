schemaVersion: 1
name: "srvcs-lcm"
slug: "lcm"
repository: "srvcs/lcm"
package: "srvcs-lcm"
function: "number theory: least common multiple"
kind: "orchestrator"
categories:
  - "number-theory"
dependencies:
  - slug: "gcd"
    service: "srvcs-gcd"
  - slug: "divide"
    service: "srvcs-divide"
  - slug: "multiply"
    service: "srvcs-multiply"
endpoints:
  - method: "GET"
    path: "/"
    purpose: "Service identity"
  - method: "POST"
    path: "/"
    purpose: "Evaluate the service function"
  - method: "GET"
    path: "/healthz"
    purpose: "Liveness probe"
  - method: "GET"
    path: "/readyz"
    purpose: "Readiness probe"
  - method: "GET"
    path: "/metrics"
    purpose: "Prometheus metrics"
  - method: "GET"
    path: "/openapi.json"
    purpose: "OpenAPI document"
inputs:
  - name: "a"
    type: "integer"
    required: true
  - name: "b"
    type: "integer"
    required: true
outputs:
  - name: "a"
    type: "integer"
  - name: "b"
    type: "integer"
  - name: "result"
    type: "integer"
configuration:
  - name: "SRVCS_BIND_ADDR"
    default: "0.0.0.0:8080"
    purpose: "Bind address"
  - name: "SRVCS_ENV"
    default: "development"
    purpose: "Environment label for logs"
  - name: "RUST_LOG"
    default: "info,tower_http=info"
    purpose: "Tracing filter"
  - name: "SRVCS_DIVIDE_URL"
    default: "http://127.0.0.1:8091"
    purpose: "Base URL for srvcs-divide"
  - name: "SRVCS_GCD_URL"
    default: "http://127.0.0.1:8090"
    purpose: "Base URL for srvcs-gcd"
  - name: "SRVCS_MULTIPLY_URL"
    default: "http://127.0.0.1:8092"
    purpose: "Base URL for srvcs-multiply"
